<!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TD - STEP 1: The Engine</title>
        <style>
            :root {
                --bg: #11161d;
                --panel:#1a222c;
                --text: #e7edf3;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 14px;
                background: var(--bg);
                color: var(--text);
                font-family: ui-sans-serif, system-ui, "Seoge UI", sans-serif;
            }
            h1 {
                font-size: 18px;
                font-weight: 600;
                margin: 0;
                letter-spacing: .2px;
            }
            p.hint {
                margin: 0;
                color: #8b97a8;
                font-size: 13px;
            }
            canvas {
                background: var(--panel);
                border-radius: 10px;
                box-shadow: 0 10px 30px rgba(0,0,0,.4);
            }
        </style>
    </head>
    <body>
        <h1>Tower Defense - Step 1: Just the Engine</h1>
        <p class="hint">One Enemy walks the Path. Nothing else. That's the point.</p>
        <canvas id="game" width="600" height="400"></canvas>

        <script>
            // ==== 1. Setup ====
            const canvas = document.getElementById("game");
            const ctx = canvas.getContext("2d");

            const PATH_COLOR = "#3a4a5c";
            const ENEMY_COLOR = "#ff8c5a";
            const LABEL_COLOR = "#8b97a8";

            const LAPS_LABEL = "Laps: ";
            // ==== 2. The Path ====
            const path = [
                { x: 0, y: 80 },
                { x: 480, y: 80 },
                { x: 480, y: 200 },
                { x: 120, y: 200 },
                { x: 120, y: 320 },
                { x: 600, y: 320 },
            ];
            // ==== 3. The Enemy ====
            let enemy  = {
                x: path[0].x,
                y: path[0].y,
                speed: 2,
                target: 1,
            };

            let laps = 0;

            function reset() {
                enemy.x = path[0].x;
                enemy.y = path[0].y;
                enemy.target = 1;
            }

            // ==== 4. Update: logic per frame ====

            function update() {
                const t = path[enemy.target];
                const dx = t.x - enemy.x;
                const dy = t.y - enemy.y;
                const dist = Math.hypot(dx, dy);

                if (dist < enemy.speed) {
                    enemy.x = t.x;
                    enemy.y = t.y;
                    enemy.target++;
                    if (enemy.target >= path.length) {
                        laps++;
                        reset();
                    }
                } else {
                    enemy.x += (dx / dist) * enemy.speed;
                    enemy.y += (dy / dist) * enemy.speed;
                }
            }

            // ==== 5. Draw: picture per frame ====
            function draw() {
                ctx.clearRect(0,0, canvas.width, canvas.height);

                ctx.strokeStyle = PATH_COLOR;
                ctx.lineWidth = 14;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.beginPath();
                ctx.moveTo(path[0].x, path[0].y);
                for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
                ctx.stroke();

                ctx.fillStyle = ENEMY_COLOR;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, 10, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = LABEL_COLOR;
                ctx.font = "13px sans-serif";
                ctx.fillText(LAPS_LABEL + laps, 12, 24);
            }

            // ==== 6. The Game Loop ====
            function loop() {
                update();
                draw();
                requestAnimationFrame(loop);
            }

            loop();
        </script>
    </body>
</html>
