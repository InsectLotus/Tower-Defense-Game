<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TD - STEP 3: The Projectiles</title>
        <style>
            :root {
                --bg: #11161d;
                --panel:#1a222c;
                --text: #e7edf3;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 14px;
                background: var(--bg);
                color: var(--text);
                font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
            }
            h1 {
                font-size: 18px;
                font-weight: 600;
                margin: 0;
                letter-spacing: .2px;
            }
            p.hint {
                margin: 0;
                color: #8b97a8;
                font-size: 13px;
            }
            canvas {
                background: var(--panel);
                border-radius: 10px;
                box-shadow: 0 10px 30px rgba(0,0,0,.4);
                cursor: crosshair;
            }
        </style>
    </head>
    <body>
        <h1>Tower Defense - Step 3b: flying projectiles</h1>
        <p class="hint">Place towers near the Path. They fire projectiles at the nearest enemy.</p>
        <canvas id="game" width="600" height="400"></canvas>

        <script>
            // ==== Setup ====
            const canvas = document.getElementById("game");
            const ctx = canvas.getContext("2d");

            const PATH_COLOR = "#3a4a5c";
            const ENEMY_COLOR = "#ff8c5a";
            const TOWER_COLOR = "#4fd6c4";
            const GRID_COLOR = "#22303c";
            const RANGE_COLOR = "rgba(79,214,196,0.12)";
            const PROJ_COLOR = "#cdeef0";
            const HPBAR_BG = "#3a2218";
            const HPBAR_FG = "#ff8c5a";
            const LABEL_COLOR = "#8b97a8";

            const LAPS_LABEL = "Leaks: ";
            const TOWERS_LABEL = "Towers: ";
            const MONEY_LABEL = "Money: ";

            // ==== The Grid ====
            const CELL = 40;
            const COLS = canvas.width  / CELL;
            const ROWS = canvas.height / CELL;

            // ==== Tuning Knobs ====
            const ENEMY_HP = 6;
            const ENEMY_SPEED = 2;
            const TOWER_RANGE = 95;
            const DAMAGE = 2;
            const FIRE_EVERY = 25;
            const PROJ_SPEED = 6;

            // ==== Economy ====
            const START_MONEY = 100;
            const TOWER_COST = 25;
            const KILL_REWARD = 5;

            // ==== The Path ====
            const path = [
                { x: 0, y: 80 },
                { x: 480, y: 80 },
                { x: 480, y: 200 },
                { x: 120, y: 200 },
                { x: 120, y: 320 },
                { x: 600, y: 320 },
            ];

            // ==== The Enemy ====
            let enemies = [];
            let leaks = 0;

            function makeEnemy() {
                return {
                    x: path[0].x,
                    y: path[0].y,
                    speed: ENEMY_SPEED,
                    target: 1,
                    hp: ENEMY_HP,
                    maxHp: ENEMY_HP,
                    alive: true,
                };
            }

            // ==== The Towers ====

            let towers = [];
            let money = START_MONEY;

            function isOccupied(col, row) {
                return towers.some(t => t.col === col && t.row === row);
            }

            function towerCenter(t) {
                return { x: t.col * CELL + CELL / 2, y: t.row * CELL + CELL / 2 };
            }

            // ==== Projectiles ====
            let projectiles = [];


            // ==== Mouse Input ====

            canvas.addEventListener("click", (e) => {
                const rect = canvas.getBoundingClientRect();

                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                const mouseX = (e.clientX - rect.left) * scaleX;
                const mouseY = (e.clientY - rect.top) * scaleY;

                const col = Math.floor(mouseX / CELL);
                const row = Math.floor(mouseY / CELL);

                if (col >= 0 && col < COLS && row >= 0 && row < ROWS && !isOccupied(col, row)) {
                    if (money >= TOWER_COST) {
                        towers.push({ col, row, range: TOWER_RANGE, cooldown: 0 });
                        money -= TOWER_COST;
                    }
                }
            });

            // ==== Update: logic per frame ====
            function update() {

                for (const e of enemies) {
                    const t = path[e.target];
                    const dx = t.x - e.x;
                    const dy = t.y - e.y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < e.speed) {
                        e.x = t.x;
                        e.y = t.y;
                        e.target++;
                        if(e.target >= path.length) {
                            leaks++;
                            e.alive = false;
                        }
                    } else {
                        e.x += (dx / dist) * e.speed;
                        e.y += (dy / dist) * e.speed;
                    }
                }

                // ==== Towers fire ====

                for (const tower of towers) {
                    if (tower.cooldown > 0) tower.cooldown--;

                    const c = towerCenter(tower);

                    let nearest = null;
                    let nearestDist = Infinity;
                    for (const e of enemies) {
                        if (!e.alive) continue;
                        const d = Math.hypot(e.x - c.x, e.y - c.y);
                        if (d <= tower.range && d < nearestDist) {
                            nearest = e;
                            nearestDist = d;
                        }
                    }

                    if (nearest && tower.cooldown <= 0) {
                        tower.cooldown = FIRE_EVERY;
                        projectiles.push({
                            x: c.x,
                            y: c.y,
                            target: nearest,
                            speed: PROJ_SPEED,
                            damage: DAMAGE,
                            alive: true,
                        });
                    }
                }

                // ==== move projectiles ====
                for (const p of projectiles) {
                    if (!p.target.alive) { p.alive = false; continue; }

                    const dx = p.target.x - p.x;
                    const dy = p.target.y - p.y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < p.speed) {
                        p.target.hp -= p.damage;
                        if (p.target.hp <= 0) {
                            p.target.alive = false;
                            money += KILL_REWARD;
                        }
                        p.alive = false;
                    } else {
                        p.x += (dx / dist) * p.speed;
                        p.y += (dy / dist) * p.speed;
                    }
                }

                // ==== clean up dead things ====
                enemies = enemies.filter(e => e.alive);
                projectiles = projectiles.filter(p => p.alive);

                if (enemies.length === 0) enemies.push(makeEnemy());
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = GRID_COLOR;
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let c = 0; c <= COLS; c++) {
                    ctx.moveTo(c * CELL, 0);
                    ctx.lineTo(c * CELL, canvas.height);
                }
                for ( let r = 0; r <= ROWS; r++) {
                    ctx.moveTo(0, r * CELL);
                    ctx.lineTo(canvas.width, r * CELL);
                }
                ctx.stroke();

                ctx.strokeStyle = PATH_COLOR;
                ctx.lineWidth = 14;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.beginPath();
                ctx.moveTo(path[0].x, path[0].y);
                for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
                ctx.stroke();

                for (const tower of towers) {
                    const c = towerCenter(tower);
                    ctx.fillStyle = RANGE_COLOR;
                    ctx.beginPath();
                    ctx.arc(c.x, c.y, tower.range, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = TOWER_COLOR;
                    const s = CELL - 12;
                    ctx.fillRect(c.x - s / 2, c.y - s / 2, s, s);
                }

                ctx.fillStyle = PROJ_COLOR;
                for (const p of projectiles) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                }

                for (const e of enemies) {
                    ctx.fillStyle = ENEMY_COLOR;
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, 10, 0, Math.PI * 2);
                    ctx.fill();

                    const w =24, h = 4;
                    ctx.fillStyle = HPBAR_BG;
                    ctx.fillRect(e.x - w / 2, e.y -18, w, h);
                    ctx.fillStyle = HPBAR_FG;
                    ctx.fillRect(e.x - w / 2, e.y -18, w * (e.hp / e.maxHp), h);
                }

                ctx.fillStyle = LABEL_COLOR;
                ctx.font = "13px sans-serif";
                ctx.fillText(MONEY_LABEL + money, 12, 44);
                ctx.fillText(LAPS_LABEL + leaks, 12, 24);
                ctx.fillText(TOWERS_LABEL + towers.length, 12, 44);
            }

            function loop() {
                update();
                draw();
                requestAnimationFrame(loop);
            }

            loop();
        </script> 
    </body>
</html>
